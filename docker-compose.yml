version: '3.8'

services:
  spanner-emulator:
    image: gcr.io/cloud-spanner-emulator/emulator:latest
    ports:
      - "9010:9010"
      - "9020:9020"
    environment:
      - SPANNER_EMULATOR_HOST=0.0.0.0:9010
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9020/"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s